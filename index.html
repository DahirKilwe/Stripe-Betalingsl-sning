<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betaling</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    #payment-element {
      margin-top: 20px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #message {
      margin-top: 15px;
      color: red;
    }

    #payment-area {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Betaling</h1>
  <p>Skriv inn hvor mye du vil betale.</p>

  <label for="amount">Beløp i kroner</label>
  <input type="number" id="amount" placeholder="f.eks. 199" min="5" step="1" />

  <button id="start-payment">Fortsett til betaling</button>

  <div id="payment-area">
    <form id="payment-form">
      <div id="payment-element"></div>
      <button id="submit">Betal nå</button>
    </form>
  </div>

  <div id="message"></div>

  <button onclick="goHome()">⬅️ Avbryt</button>

<script>
function goHome() {
  window.location.href = "/";
}
</script>

  <script src="app.js"></script>
</body>
</html>
